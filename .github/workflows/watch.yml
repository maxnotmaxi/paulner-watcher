name: Paulaner Jersey Watcher

# Nur manueller Start – laeuft dann einmal ~5 Std. durch und prueft selbst.
on:
  workflow_dispatch:
    inputs:
      test:
        description: "Test-Push senden (ntfy pruefen)"
        type: boolean
        default: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 340   # Sicherheitslimit, unter GitHubs 6-Std-Grenze
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Seite dauerhaft beobachten
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER }}
          TEST_NOTIFY: ${{ inputs.test }}
          LOOP: "1"
          LOOP_MINUTES: "300"      # ~5 Stunden beobachten
          INTERVAL_SECONDS: "60"   # jede Minute pruefen
        run: python check.py
